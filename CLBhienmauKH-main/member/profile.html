<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member - Hồ sơ cá nhân</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="../assets/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/theme.css" />
</head>
<body class="bg-surface text-on-surface" data-page="member-profile">
  <div class="member-layout">
    <div id="memberSidebar"></div>

    <main class="p-8 md:p-10">
      <section class="lookup-hero zone-card rounded-[2rem] p-7 md:p-10 fade-up relative overflow-hidden">
        <span class="sticker sticker-sm sticker-top-right"><span class="material-symbols-outlined">badge</span></span>
        <h2 class="font-headline text-4xl font-extrabold">Thông tin cá nhân</h2>
        <p class="text-on-surface-variant mt-3">Cập nhật hồ sơ để hệ thống hỗ trợ đăng ký và tra cứu chính xác hơn.</p>
      </section>

      <form id="profileForm" class="mt-8 zone-card bg-white rounded-2xl p-6 editorial-shadow grid md:grid-cols-2 gap-4 fade-up delay-1 relative overflow-hidden">
        <span class="sticker sticker-sm sticker-bottom-right"><span class="material-symbols-outlined">edit</span></span>
        <div><label class="text-sm font-semibold">Họ và tên</label><input name="fullName" class="w-full rounded-xl bg-surface-container-low border-none" /></div>
        <div><label class="text-sm font-semibold">MSSV</label><input name="studentCode" class="w-full rounded-xl bg-surface-container-low border-none" /></div>
        <div><label class="text-sm font-semibold">Email</label><input name="email" class="w-full rounded-xl bg-surface-container-low border-none" /></div>
        <div><label class="text-sm font-semibold">Số điện thoại</label><input name="phone" class="w-full rounded-xl bg-surface-container-low border-none" /></div>
        <div><label class="text-sm font-semibold">CCCD</label><input name="cccd" class="w-full rounded-xl bg-surface-container-low border-none" /></div>
        <div><label class="text-sm font-semibold">Nhóm máu</label><input name="bloodGroup" class="w-full rounded-xl bg-surface-container-low border-none" /></div>
        <div class="md:col-span-2"><button class="signature-gradient text-white px-6 py-3 rounded-xl font-bold">Cập nhật thông tin</button></div>
      </form>
      <p id="profileNotice" class="mt-3 text-sm text-tertiary"></p>
    </main>
  </div>
  <script src="../assets/app.js"></script>
</body>
</html>
